name: NEST Platform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check for hardcoded Railway URLs
        run: |
          if grep -rn "web-production-" --include="*.ts" --include="*.tsx" --include="*.js" . \
              | grep -v "node_modules" | grep -v ".next" | grep -v "health/route.ts"; then
            echo "ERROR: Hardcoded Railway URL found. Use NEXT_PUBLIC_API_URL env var."
            exit 1
          fi
          echo "OK: No hardcoded Railway URLs"

      - name: TypeScript check (non-blocking)
        run: npm run typecheck 2>&1 || echo "WARNING: TypeScript errors present — clean up ignoreBuildErrors when resolved"
        continue-on-error: true

      - name: Next.js build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Build success
        run: echo "Build passed — Vercel will auto-deploy from this push"
