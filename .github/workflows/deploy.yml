name: NEST Platform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch so stale builds never block new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NEXT_TELEMETRY_DISABLED: '1'

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 · GUARD  (no npm install — runs in seconds)
# Fast static checks that fail the entire pipeline before spending CI minutes
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  guard:
    name: Guard Rails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Hardcoded Railway URL ──────────────────────────────────────────────
      - name: No hardcoded Railway URLs
        run: |
          MATCHES=$(grep -rn "web-production-" \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            frontend/ | grep -v node_modules | grep -v ".next" || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Hardcoded Railway URL found. Use NEXT_PUBLIC_API_URL env var."
            echo "$MATCHES"
            exit 1
          fi
          echo "✓ No hardcoded Railway URLs"

      # ── Dead Vercel backend URL ────────────────────────────────────────────
      - name: No dead Vercel backend URLs
        run: |
          MATCHES=$(grep -rn "backend-iota-sand-94\.vercel\.app" \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            frontend/ | grep -v node_modules | grep -v ".next" || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Dead legacy Vercel backend URL found."
            echo "$MATCHES"
            exit 1
          fi
          echo "✓ No dead Vercel backend URLs"

      # ── Localhost in production paths ─────────────────────────────────────
      - name: No localhost references
        run: |
          MATCHES=$(grep -rn "localhost:8000\|localhost:8100\|127\.0\.0\.1" \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            frontend/ | grep -v node_modules | grep -v ".next" \
            | grep -v "\.env\." | grep -v "README" || true)
          if [ -n "$MATCHES" ]; then
            echo "::warning::Localhost reference found — will break in production"
            echo "$MATCHES"
          else
            echo "✓ No localhost references"
          fi

      # ── vercel.json schema safety ──────────────────────────────────────────
      - name: vercel.json schema safety
        run: |
          if [ -f vercel.json ]; then
            # rootDirectory, buildCommand, outputDirectory are dashboard-only — NOT valid in vercel.json
            for FIELD in rootDirectory buildCommand outputDirectory; do
              if grep -q "\"$FIELD\"" vercel.json; then
                echo "::error::vercel.json contains \"$FIELD\" — this is a dashboard-only field and causes instant Vercel ERROR. Remove it."
                exit 1
              fi
            done
            echo "✓ vercel.json schema is safe"
            cat vercel.json
          else
            echo "::warning::No vercel.json found — Vercel will use defaults"
          fi

      # ── Hydration risk scan (uses pre-installed Node 20 on ubuntu-latest) ──
      - name: Hydration risk scan
        run: node scripts/hydration-guard.mjs
        continue-on-error: true   # warning only — never blocks build

      # ── console.log count (informational) ─────────────────────────────────
      - name: console.log audit
        run: |
          COUNT=$(grep -rn "console\.log" \
            --include="*.tsx" --include="*.ts" \
            frontend/ | grep -v node_modules | grep -v ".next" \
            | grep -v "route\.ts" | grep -v "health" | wc -l || echo "0")
          if [ "$COUNT" -gt 50 ]; then
            echo "::warning::$COUNT console.log statements in source — consider removing before investor demo"
          else
            echo "::notice::console.log count: $COUNT"
          fi

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 · TYPECHECK  (non-blocking — warns, never fails deploy)
# ─────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    needs: guard
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript check
        run: |
          set +e
          npm run typecheck 2>&1 | tee /tmp/ts-out.txt
          TS_EXIT=$?
          ERROR_COUNT=$(grep -c "error TS" /tmp/ts-out.txt 2>/dev/null || echo "0")
          if [ "$TS_EXIT" -ne 0 ]; then
            echo "::warning::TypeScript — $ERROR_COUNT error(s). ignoreBuildErrors is ON so build still passes. Fix before removing that flag."
            # Show first 20 errors for triage
            grep "error TS" /tmp/ts-out.txt | head -20 | while read -r line; do
              echo "::warning::$line"
            done
          else
            echo "✓ TypeScript clean ($ERROR_COUNT errors)"
          fi

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 · LINT  (non-blocking — warns, never fails deploy)
# ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: guard
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: ESLint
        run: |
          set +e
          npm run lint 2>&1 | tee /tmp/lint-out.txt
          LINT_EXIT=$?
          ERROR_COUNT=$(grep -c "error " /tmp/lint-out.txt 2>/dev/null || echo "0")
          WARN_COUNT=$(grep -c "warning " /tmp/lint-out.txt 2>/dev/null || echo "0")
          if [ "$LINT_EXIT" -ne 0 ]; then
            echo "::warning::ESLint — $ERROR_COUNT error(s), $WARN_COUNT warning(s). Run 'npm run lint:fix' locally."
          else
            echo "✓ Lint clean ($WARN_COUNT warnings)"
          fi

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 · BUILD  (BLOCKING — must pass for Vercel to deploy)
# Runs in parallel with typecheck/lint; only blocked by guard
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: guard
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Provide stub env vars so Next.js doesn't throw "required env var missing"
      # during static analysis — real values come from Vercel dashboard at runtime
      - name: Next.js build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://placeholder.railway.app' }}
          NEXT_TELEMETRY_DISABLED: '1'

      # Report build size — useful for catching bundle bloat before it hits Vercel
      - name: Build size report
        run: |
          echo "## Build Artifact Report" >> $GITHUB_STEP_SUMMARY
          if [ -d ".next" ]; then
            STATIC_SIZE=$(du -sh .next/static 2>/dev/null | cut -f1 || echo "unknown")
            PAGE_COUNT=$(find .next/server/app -name "*.html" 2>/dev/null | wc -l || echo "0")
            JS_CHUNKS=$(find .next/static/chunks -name "*.js" 2>/dev/null | wc -l || echo "0")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Static bundle size | $STATIC_SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| Static pages | $PAGE_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "| JS chunks | $JS_CHUNKS |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "✓ Build passed — Vercel will auto-deploy from this push"

      # Upload trace on failure so you can see EXACTLY what crashed without digging Vercel logs
      - name: Upload build trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: next-build-trace-${{ github.sha }}
          path: |
            frontend/.next/trace
            frontend/.next/server/app-paths-manifest.json
          retention-days: 5
          if-no-files-found: ignore

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 · HEALTH CHECK  (post-deploy, advisory — runs only on main push)
# Pings the live Vercel URL to confirm key routes are returning 200
# Requires secret: NEST_VERCEL_URL = https://nest-platform.vercel.app (or alias)
# ─────────────────────────────────────────────────────────────────────────────
  health:
    name: Post-Deploy Health
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Give Vercel 90 seconds to pick up the build and start deploying
      - name: Wait for Vercel propagation
        run: |
          echo "Waiting 90s for Vercel to pick up the build..."
          sleep 90

      - name: Run health check
        run: node scripts/health-check.mjs
        env:
          NEST_HEALTH_URL: ${{ secrets.NEST_VERCEL_URL }}
        continue-on-error: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 6 · SUMMARY  (always runs — aggregates results into one table)
# ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [guard, typecheck, lint, build, health]
    if: always()
    steps:
      - name: Write summary
        run: |
          GUARD="${{ needs.guard.result }}"
          TS="${{ needs.typecheck.result }}"
          LINT="${{ needs.lint.result }}"
          BUILD="${{ needs.build.result }}"
          HEALTH="${{ needs.health.result }}"

          guard_icon() { [ "$1" = "success" ] && echo "✅" || echo "❌"; }
          advisory_icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "⚠️" ;;
              skipped) echo "⏭️" ;;
              *) echo "❓" ;;
            esac
          }

          echo "## NEST Platform CI — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status | Blocking? |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| $(guard_icon $GUARD) Guard Rails | \`$GUARD\` | Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| $(advisory_icon $TS) TypeScript | \`$TS\` | No (ignoreBuildErrors=true) |" >> $GITHUB_STEP_SUMMARY
          echo "| $(advisory_icon $LINT) Lint | \`$LINT\` | No (ignoreDuringBuilds=true) |" >> $GITHUB_STEP_SUMMARY
          echo "| $(guard_icon $BUILD) Build | \`$BUILD\` | Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| $(advisory_icon $HEALTH) Post-Deploy Health | \`$HEALTH\` | No |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$GUARD" != "success" ]; then
            echo "❌ **Guard failed — deploy blocked.** Fix the flagged issues and re-push." >> $GITHUB_STEP_SUMMARY
          elif [ "$BUILD" != "success" ]; then
            echo "❌ **Build failed — Vercel deploy will not trigger.** Check build logs above." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **All blocking checks passed — Vercel is deploying.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Links:**" >> $GITHUB_STEP_SUMMARY
            echo "- [Vercel Dashboard](https://vercel.com/ardan-edge-capital/nest-platform)" >> $GITHUB_STEP_SUMMARY
            echo "- [Railway Backend](https://railway.app)" >> $GITHUB_STEP_SUMMARY
            echo "- [Supabase](https://supabase.com/dashboard/project/tquotedgiapmivitjipn)" >> $GITHUB_STEP_SUMMARY
          fi

          # Summary is informational only — the Build job already signals failure.
          # Never exit 1 here; doing so created a confusing second failure indicator.
          echo "done"
